<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ModuCare MS</title>
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/src/css/main.css">
  <link rel="stylesheet" href="/css/design-system.css">
  <meta name="description" content="ModuCare modular management system - admin shell">
<body>
  <script type="module">
    import { requireAuth } from '/js/auth.js';
    requireAuth();
  </script>
  <div class="mc-app" id="mc-app">
    <aside class="mc-sidebar" role="navigation" aria-label="Main navigation">
      <div class="mc-brand" tabindex="0">ModuCare</div>
      <nav>
        <ul class="mc-nav-list">
          <li><a href="/dashboard" data-route class="mc-nav-link">Dashboard</a></li>
          <li><a href="/staff" data-route class="mc-nav-link">Staff</a></li>
          <li><a href="/operations" data-route class="mc-nav-link mc-nav-operations">Operations</a></li>
          <li><a href="/finance" data-route class="mc-nav-link mc-nav-finance">Finance</a></li>
          <li><a href="/analytics" data-route class="mc-nav-link mc-nav-analytics">Analytics</a></li>
          <li><a href="/admin" data-route class="mc-nav-link mc-nav-admin" data-admin-only>Admin</a></li>
          <!-- Sign In intentionally hidden from main UI for security; use secret login -->
        </ul>
      </nav>
  </aside>

  <div class="mc-main">
      <header class="mc-header" role="banner">
        <div class="mc-search" role="search">
          <label for="global-search" class="visually-hidden">Search</label>
          <input id="global-search" type="search" placeholder="Search reports, people, tickets" aria-label="Global search">
        </div>
        <div class="mc-header-actions">
          <button class="mc-btn icon" aria-label="Notifications" id="notif-btn">🔔</button>
          <div class="mc-profile" id="profile" tabindex="0" aria-haspopup="menu" aria-label="User menu">
            <button class="mc-btn" id="profile-btn">User ▾</button>
            <ul class="mc-profile-menu" role="menu" aria-label="Profile menu">
              <li role="none"><button role="menuitem" class="mc-btn" id="profile-signout">Sign out</button></li>
            </ul>
          </div>
        </div>
      </header>
      <main id="app-content" class="mc-content" role="main" tabindex="0" aria-live="polite">
        <!-- Feature content will be injected here -->
      </main>
      <footer class="mc-footer" role="contentinfo">ModuCare — Internal Use</footer>
    </div>
  </div>
  <script type="module" src="/src/js/router.js"></script>
</body>
</html>
