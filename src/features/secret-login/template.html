<section class="feature-secret-login" aria-labelledby="secret-login-title">
  <h2 id="secret-login-title">Administrator Sign In (Secret)</h2>
  <form id="secret-form" aria-label="Secret admin login">
    <label for="secret-key">Secret Key</label>
    <input id="secret-key" name="secret" type="password" inputmode="text" autocomplete="off" required>
    <label for="admin-username">Username</label>
    <input id="admin-username" name="username" type="text" required>
    <button type="submit" class="mc-btn">Unlock Admin</button>
  </form>
  <p class="mc-muted">This route is not linked in the UI. Use keyboard shortcut or know the path.</p>
</section>
