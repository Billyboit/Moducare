<section class="feature-dashboard" aria-labelledby="dashboard-title">
  <h1 id="dashboard-title">Dashboard</h1>

  <div class="dashboard-layout">
    <aside class="dashboard-left" aria-label="Dashboard navigation and widgets">
      <div class="left-header">
        <button id="left-collapse" aria-label="Toggle left panel" class="mc-btn small">◀</button>
      </div>
      <nav class="dashboard-tabs" role="tablist" aria-orientation="vertical">
        <button role="tab" aria-selected="true" data-tab="overview" class="tab-btn"><svg class="icon" aria-hidden="true"><use href="/src/assets/icons.svg#icon-overview"></use></svg>Overview <span class="badge" data-badge-for="overview">4</span></button>
        <button role="tab" aria-selected="false" data-tab="reports" class="tab-btn"><svg class="icon" aria-hidden="true"><use href="/src/assets/icons.svg#icon-reports"></use></svg>Reports <span class="badge" data-badge-for="reports">0</span></button>
        <button role="tab" aria-selected="false" data-tab="alerts" class="tab-btn"><svg class="icon" aria-hidden="true"><use href="/src/assets/icons.svg#icon-alerts"></use></svg>Alerts <span class="badge" data-badge-for="alerts">0</span></button>
        <button role="tab" aria-selected="false" data-tab="shortcuts" class="tab-btn"><svg class="icon" aria-hidden="true"><use href="/src/assets/icons.svg#icon-shortcuts"></use></svg>Shortcuts</button>
      </nav>

      <div class="dashboard-widgets" id="left-widgets">
        <section class="widget" aria-labelledby="wf-title">
          <h3 id="wf-title">Quick Filters</h3>
          <ul class="quick-filters" id="quick-filters">
            <li><button class="mc-btn small" data-filter="today">Today</button></li>
            <li><button class="mc-btn small" data-filter="week">This Week</button></li>
            <li><button class="mc-btn small" data-filter="overdue">Overdue</button></li>
            <li><button class="mc-btn small" data-filter="high">High Priority</button></li>
          </ul>
        </section>

        <section class="widget" aria-labelledby="sc-title">
          <h3 id="sc-title">Shortcuts</h3>
          <ul class="shortcuts">
            <li><a href="/staff" data-route class="mc-link"><svg class="icon" aria-hidden="true"><use href="/src/assets/icons.svg#icon-staff"></use></svg>Staff Directory <span class="badge">12</span></a></li>
            <li><a href="/finance" data-route class="mc-link"><svg class="icon" aria-hidden="true"><use href="/src/assets/icons.svg#icon-billing"></use></svg>Billing <span class="badge">3</span></a></li>
            <li><a href="/operations" data-route class="mc-link"><svg class="icon" aria-hidden="true"><use href="/src/assets/icons.svg#icon-ops"></use></svg>Tasks <span class="badge">5</span></a></li>
          </ul>
        </section>

        <section class="widget" aria-labelledby="mini-cal">
          <h3 id="mini-cal">Calendar</h3>
          <div class="mini-calendar" id="mini-calendar" aria-hidden="false">Mar 2026 · • 12 events</div>
        </section>
      </div>
    </aside>

    <div class="dashboard-main">
      <div class="kpi-grid" role="region" aria-label="Key performance indicators">
        <div class="kpi" tabindex="0"><div class="value">1,248</div><div class="label">Active Patients</div></div>
        <div class="kpi" tabindex="0"><div class="value">27</div><div class="label">Open Tasks</div></div>
        <div class="kpi" tabindex="0"><div class="value">$94,300</div><div class="label">Monthly Revenue</div></div>
        <div class="kpi" tabindex="0"><div class="value">98%</div><div class="label">Data Sync</div></div>
      </div>

      <section aria-labelledby="recent-title">
        <h2 id="recent-title">Recent Activity</h2>
        <div class="table-controls">
          <label>Search: <input id="activity-search" type="search" placeholder="Search recent activity"></label>
          <div class="table-actions">
            <button id="sort-time" class="mc-btn small">Sort by Time</button>
            <button id="export-csv" class="mc-btn small">Export CSV</button>
          </div>
        </div>
        <table class="dense-table" role="table" aria-label="Recent activity table">
          <thead><tr><th scope="col">Time</th><th scope="col">User</th><th scope="col">Action</th><th scope="col">Details</th></tr></thead>
          <tbody id="recent-body"></tbody>
        </table>
      </section>

      <section aria-labelledby="appointments-title">
        <h2 id="appointments-title">Upcoming Appointments</h2>
        <ul id="appointments-list" class="appointments-list"></ul>
      </section>

      <section aria-labelledby="incident-title">
        <h2 id="incident-title">Report Incident</h2>
        <form id="incident-form" class="incident-form" aria-label="Incident reporting">
          <label>Title<input id="inc-title" name="title" required></label>
          <label>Description<textarea id="inc-desc" name="description" rows="3"></textarea></label>
          <label>Severity<select id="inc-severity" name="severity"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></label>
          <label>Related Patient<input id="inc-patient" name="patient"></label>
          <div><button type="submit" class="mc-btn">Submit Incident</button></div>
        </form>
      </section>
    </div>
  </div>
</section>
