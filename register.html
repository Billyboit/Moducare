<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ModuCare MS — Register</title>
  <link rel="stylesheet" href="css/design-system.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body">
  <div class="auth-layout">
    <aside class="auth-brand" aria-label="Brand">
      <div class="auth-brand__inner">
        <div class="auth-brand__logo">
          <div class="logo-mark"><span class="logo-mark__cross"></span></div>
          <div class="auth-brand__name"><span class="brand-modu">Modu</span><span class="brand-care">Care</span><span class="brand-ms">MS</span></div>
        </div>
        <div class="auth-brand__tagline">
          <h1>Create your account</h1>
          <p>Register for a developer sandbox account for local testing.</p>
        </div>
      </div>
    </aside>

    <main class="auth-form-panel">
      <div class="auth-card">
        <div class="auth-card__header">
          <h2 class="auth-card__title">Get started</h2>
          <p class="auth-card__subtitle">Create a test account for local development</p>
        </div>

        <form class="auth-form" id="register-form" novalidate>
          <div class="input-group">
            <label class="input-label" for="name">Full name</label>
            <input id="name" class="input" required />
          </div>
          <div class="input-group">
            <label class="input-label" for="email">Work Email</label>
            <input id="email" type="email" class="input" required />
          </div>
          <div class="input-group">
            <label class="input-label" for="password">Password</label>
            <input id="password" type="password" class="input" required />
          </div>
          <div class="input-group">
            <label class="input-label" for="role">Role</label>
            <select id="role" class="input">
              <option value="staff">Staff</option>
              <option value="lead">Team Lead</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-full">Create account</button>
        </form>

        <div class="auth-card__footer">
          <span class="text-sm text-secondary">Already have an account?</span>
          <a href="login.html" class="auth-link text-sm">Sign in</a>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="js/register.js"></script>
</body>
</html>
